<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Brindle Duskhorn — Level 6 Bladesinger</title><style>:root{--bg:#101114;--panel:#191b20;--panel2:#20242b;--ink:#f2efe8;--muted:#b9b1a5;--line:#353b45;--accent:#d69b4f;--accent2:#78c092;--bad:#cf6679;--blue:#8ab4f8;--shadow:0 10px 25px #0008}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#111217,#171a20 45%,#101114);color:var(--ink);font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:var(--blue)}.hero{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.2rem;background:#0c0d10ee;border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}h1{font-size:clamp(1.8rem,4vw,3.2rem);line-height:1;margin:.1rem 0;color:var(--accent)}h2{margin:0 0 .75rem;color:var(--accent);font-size:1.15rem;letter-spacing:.03em;text-transform:uppercase}h3{margin:.15rem 0 .4rem;color:var(--ink)}p{margin:.35rem 0}.muted,small{color:var(--muted)}main{max-width:1400px;margin:0 auto;padding:1rem}.status-card{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}.status{padding:.35rem .55rem;border-radius:999px;border:1px solid var(--bad);color:#ffdfe5;background:#221217}.status.good{border-color:var(--accent2);color:#dff8e8;background:#102017}select,button{font:inherit;border-radius:8px;border:1px solid var(--line);background:#252a32;color:var(--ink);padding:.38rem .55rem}button{cursor:pointer;transition:.12s transform,.12s background}.actions button,.button-row button,.button-grid button{margin:.15rem}button:hover{background:#303746;transform:translateY(-1px)}button.primary{border-color:var(--accent);background:#3b2a16}.grid{display:grid;grid-template-columns:1.15fr .85fr .85fr;gap:1rem;margin-bottom:1rem}.top-grid{grid-template-columns:1.3fr .85fr .85fr}.card,.summon{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:1rem;box-shadow:var(--shadow)}.wide{grid-column:span 1}.stats{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:.6rem}.stats div{background:#1116;border:1px solid var(--line);border-radius:10px;padding:.55rem}.stats b{display:block;color:var(--accent)}.stats span{display:block}.button-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.3rem}.skill-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.3rem}.stack{display:flex;flex-direction:column;gap:.55rem}.row{display:flex;gap:.8rem;align-items:center;justify-content:space-between;background:#1118;border:1px solid var(--line);border-radius:10px;padding:.6rem}.row>div:first-child{min-width:0}.actions{display:flex;gap:.25rem;flex-wrap:wrap;justify-content:flex-end}.button-row{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.65rem}.notes{white-space:pre-wrap;color:var(--muted)}.summon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}.meta{font-size:.9rem;color:var(--muted);margin-bottom:.4rem}.tags{display:flex;gap:.35rem;flex-wrap:wrap;margin:.3rem 0}.tag{font-size:.78rem;border:1px solid var(--line);border-radius:999px;padding:.12rem .4rem;color:var(--muted)}#toast{position:fixed;right:1rem;bottom:1rem;max-width:460px;background:#0d0f12;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:10px;padding:.8rem;display:none}#toast.good{border-color:var(--accent2)}#toast.bad{border-color:var(--bad)}.two{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.warning{border-color:#6d5523;background:#1d180e}.char-nav{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0}.char-nav a{display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1rem;text-decoration:none;min-width:260px}.char-nav a:hover{border-color:var(--accent)}@media(max-width:1100px){.grid,.top-grid,.summon-grid,.two{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.skill-grid{grid-template-columns:1fr 1fr}.hero{position:static;align-items:flex-start;flex-direction:column}.status-card{justify-content:flex-start}}@media print{.hero{position:static}.status-card,button,#toast{display:none}.grid,.top-grid,.summon-grid,.two{display:block}.card,.summon{break-inside:avoid;margin:0 0 10px;background:white;color:black;box-shadow:none}.card h2,.summon h3,h1{color:black}body{background:white;color:black}.row{background:white}.muted,small,.meta,.notes{color:#333}}.spell-controls{display:flex;gap:.35rem;align-items:center;justify-content:flex-end;flex-wrap:wrap}.spell-controls select{max-width:7rem}.spell-tag{display:inline-block;font-size:.75rem;border:1px solid var(--line);border-radius:999px;padding:.06rem .35rem;margin-left:.25rem;color:var(--muted)}details.spell-details{margin-top:.25rem;color:var(--muted)}summary{cursor:pointer;color:var(--accent)}
</style></head>
<body>
<header class="hero"><div><h1 id="char-title">Brindle Duskhorn — Level 6 Bladesinger</h1><p id="char-subtitle"></p></div><div class="status-card"><div id="bridge-status" class="status bad">Beyond20 bridge not detected</div><label>Roll mode <select id="roll-mode"><option value="0">Normal</option><option value="3">Advantage</option><option value="4">Disadvantage</option><option value="1">Roll twice</option><option value="2">Ask in Roll20</option></select></label><label>Whisper <select id="whisper-mode"><option value="0">Public</option><option value="1">Whisper GM</option><option value="2">Ask in Roll20</option></select></label></div></header>
<main>
<section class="grid top-grid"><article class="card wide"><h2>Core</h2><div id="core-stats" class="stats"></div><div class="button-row"><button data-roll="initiative" class="primary">Initiative</button><span id="core-buttons"></span></div></article><article class="card"><h2>Abilities</h2><div id="abilities" class="button-grid"></div></article><article class="card"><h2>Saves</h2><div id="saves" class="button-grid"></div></article></section>
<section class="grid"><article class="card wide"><h2>Skills</h2><div id="skills" class="skill-grid"></div></article><article class="card"><h2>Attacks</h2><div id="attacks" class="stack"></div></article><article class="card"><h2>Traits / Features</h2><div id="traits" class="stack"></div></article></section>
<section class="grid"><article class="card wide"><h2>Spells / Rituals / Powers</h2><div id="spells" class="stack"></div></article><article class="card"><h2>Equipment / Notes</h2><div id="equipment" class="notes"></div></article></section>
<section class="card"><h2>Summons & Familiars</h2><div class="summon-controls"><label>Summon Undead spell level <select id="undead-level"><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option></select></label></div><div id="summons" class="summon-grid"></div></section>
</main><div id="toast" aria-live="polite"></div><script>const ROLL = { NORMAL:0, DOUBLE:1, QUERY:2, ADV:3, DIS:4 };
const WHISPER = { NO:0, YES:1, QUERY:2, HIDE:3 };
let bridgeReady = false;
const $ = (id)=>document.getElementById(id);
function esc(s){return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg, good=true){const t=$('toast'); if(!t) return; t.textContent=msg; t.className=good?'good':'bad'; t.style.display='block'; clearTimeout(t._timer); t._timer=setTimeout(()=>t.style.display='none',4200);}
function rollMode(){return Number($('roll-mode')?.value ?? 0)}
function whisper(){return Number($('whisper-mode')?.value ?? 0)}
function setStatus(ok){bridgeReady=ok; const s=$('bridge-status'); if(!s) return; s.classList.toggle('good',ok); s.classList.toggle('bad',!ok); s.textContent=ok?'Beyond20 bridge detected':'Beyond20 bridge not detected';}
document.addEventListener('Beyond20_Party20Ready',()=>setStatus(true));
document.addEventListener('Beyond20_Brindle20Ready',()=>setStatus(true));
document.addEventListener('Beyond20_RollResult',(e)=>{const r=(e.detail||[])[0]||{}; if(r.error) toast(r.error,false); else toast('Sent to '+((r.vtt||['VTT']).join(', ')),true)});
function send(request, character){
  if(!bridgeReady) toast('Beyond20 bridge not detected. Load the Party20 extension and open this page through localhost or GitHub Pages.',false);
  request.action='roll';
  request.character=request.character || character || window.PARTY20_CHARACTER || {name:'Party20 Character',type:'Character',settings:{}};
  request.advantage = request.advantage ?? rollMode();
  request.whisper = request.whisper ?? whisper();
  document.dispatchEvent(new CustomEvent('Beyond20_SendMessage',{detail:[request]}));
}
function characterFor(name,type='Character'){return {name, type, settings:{}}}
function traitReq(name, source, description, character){send({type:'trait', name, source, 'source-type':'Feature', description, advantage:ROLL.NORMAL}, character)}
function rollCheck(kind, data, character){
  if(kind==='initiative') return send({type:'initiative', initiative:data.modifier}, character);
  if(kind==='ability') return send({type:'ability', name:data.name, ability:data.ability||data.name, modifier:data.modifier}, character);
  if(kind==='save') return send({type:'saving-throw', name:data.name, ability:data.ability, modifier:data.modifier}, character);
  if(kind==='skill') return send({type:'skill', skill:data.name, ability:data.ability, modifier:data.modifier}, character);
}
function attackReq(a, character, prefix='', opts={}){
  send({type:'attack', name:prefix+a.name, 'to-hit':a.toHit, rollAttack:true, rollDamage:true, damages:[a.damage], 'damage-types':[a.type], 'critical-damages':[a.crit||a.damage?.replace(/\s*[+\-].*/, '')||''], 'critical-damage-types':[a.type], range:a.range||'', description:a.description||'', advantage:opts.advantage ?? undefined}, character);
}
function spellCard(s, character){send({type:'spell-card', name:s.name, 'level-school':s.level, 'casting-time':s.time, range:s.range, duration:s.duration, components:s.components, ritual:!!s.ritual, concentration:!!s.concentration, description:s.desc||s.description||'', advantage:ROLL.NORMAL}, character)}

function levelName(n){ return n===0?'Cantrip':`${n}${n===1?'st':n===2?'nd':n===3?'rd':'th'} level`; }
function cloneSpellAtSlot(s, slot){
  const c = {...s};
  c.slot = slot || s.minLevel || 0;
  if(s.levelNumber && c.slot && c.slot !== s.levelNumber) c.name = `${s.name} (${levelName(c.slot)})`;
  let upNotes=[];
  if(s.scaling){
    const dyn = s.scaling(c.slot);
    Object.assign(c, dyn);
    if(dyn.upcastNote) upNotes.push(dyn.upcastNote);
  }
  if(upNotes.length) c.desc = `${s.desc||''}\n\nUpcast: ${upNotes.join(' ')}`;
  return c;
}
function spellCardAtSlot(s, character, slot){
  const c = cloneSpellAtSlot(s, slot);
  send({type:'spell-card', name:c.name, 'level-school':c.level, 'casting-time':c.time, range:c.range, duration:c.duration, components:c.components, ritual:!!c.ritual, concentration:!!c.concentration, description:c.desc||c.description||'', advantage:ROLL.NORMAL}, character);
}
function spellRoll(s, character, slot){
  const c = cloneSpellAtSlot(s, slot);
  send({type:'spell-attack', name:c.name, 'level-school':c.level, 'casting-time':c.time, range:c.range, duration:c.duration, components:c.components, ritual:!!c.ritual, concentration:!!c.concentration, description:c.desc||'', rollAttack:!!c.toHit, 'to-hit':c.toHit, rollDamage:!!c.damage, damages:c.damage?[c.damage]:[], 'damage-types':c.type?[c.type]:[], 'critical-damages':c.crit?[c.crit]:[], 'critical-damage-types':c.type?[c.type]:[], 'save-dc':c.saveDC, 'save-ability':c.save}, character)
}
function spellExtraRoll(s, rollKey, character, slot){
  const c = cloneSpellAtSlot(s, slot);
  const r = (c.extraRolls||{})[rollKey]; if(!r) return;
  const dmg = typeof r.damage === 'function' ? r.damage(c.slot||slot||s.minLevel||0) : r.damage;
  const desc = typeof r.desc === 'function' ? r.desc(c.slot||slot||s.minLevel||0) : (r.desc||c.desc||'');
  send({type:'spell-attack', name:`${c.name} — ${r.name}`, 'level-school':c.level, 'casting-time':c.time, range:c.range, duration:c.duration, components:c.components, description:desc, rollAttack:!!r.toHit, 'to-hit':r.toHit, rollDamage:!!dmg, damages:dmg?[dmg]:[], 'damage-types':r.type?[r.type]:[], 'critical-damages':r.crit?[r.crit]:[], 'critical-damage-types':r.type?[r.type]:[], 'save-dc':r.saveDC||c.saveDC, 'save-ability':r.save||c.save}, character)
}
function spellCheck(s, character){
  if(s.check) rollCheck('ability',{name:s.check.name, ability:s.check.ability, modifier:s.check.modifier}, character);
}
function row(title, sub, buttons, details=''){
  return `<div class="row"><div><b>${esc(title)}</b>${sub?`<br><small>${sub}</small>`:''}${details}</div><div class="actions">${buttons}</div></div>`
}
function spellControls(s,i){
  const hasRoll = s.damage || s.toHit || s.save || s.extraRolls;
  const up = s.upcast;
  let select = '';
  if(up){
    const min=s.minLevel||s.levelNumber||1, max=Math.min(s.maxSlot||9, 3);
    select = `<select data-slot-for="${i}" title="slot level">${Array.from({length:max-min+1},(_,k)=>min+k).map(n=>`<option value="${n}"${n===(s.defaultSlot||min)?' selected':''}>${levelName(n)}</option>`).join('')}</select>`;
  }
  const slotAttr = up ? ` data-use-slot="${i}"` : '';
  let buttons = `<div class="spell-controls"><button data-spellcard="${i}"${slotAttr}>Card</button>`;
  if(hasRoll) buttons += `<button data-spellroll="${i}"${slotAttr}>Roll</button>`;
  if(s.check) buttons += `<button data-spellcheck="${i}">${esc(s.check.label||'Check')}</button>`;
  if(s.extraRolls){
    Object.entries(s.extraRolls).forEach(([k,r])=>{ buttons += `<button data-spellextra="${i}" data-extra-key="${esc(k)}"${slotAttr}>${esc(r.button||r.name)}</button>`; });
  }
  if(select) buttons += select;
  buttons += `</div>`;
  return buttons;
}
function renderSheet(data){
  window.PARTY20_CHARACTER = characterFor(data.name);
  document.title = data.title || data.name;
  $('char-title').textContent = data.name;
  $('char-subtitle').textContent = data.subtitle || '';
  $('core-stats').innerHTML = data.core.map(x=>`<div><b>${esc(x.label)}</b><span>${esc(x.value)}</span></div>`).join('');
  $('core-buttons').innerHTML = (data.coreButtons||[]).map(k=>`<button data-trait="${esc(k)}" class="primary">${esc(data.traits[k]?.name||k)}</button>`).join('');
  $('abilities').innerHTML = data.abilities.map(a=>`<button data-check="ability" data-name="${esc(a.name)}" data-ability="${esc(a.name)}" data-modifier="${esc(a.modifier)}">${esc(a.name)} ${esc(a.score)} (${esc(a.modifier)})</button>`).join('');
  $('saves').innerHTML = data.saves.map(a=>`<button data-check="save" data-name="${esc(a.name)}" data-ability="${esc(a.ability)}" data-modifier="${esc(a.modifier)}">${esc(a.name)} ${esc(a.modifier)}</button>`).join('');
  $('skills').innerHTML = data.skills.map(a=>`<button data-check="skill" data-name="${esc(a.name)}" data-ability="${esc(a.ability)}" data-modifier="${esc(a.modifier)}">${esc(a.name)} ${esc(a.modifier)}</button>`).join('');
  $('attacks').innerHTML = data.attacks.map((a,i)=>row(a.name, `${esc(a.toHit)}; ${esc(a.damage)} ${esc(a.type)}; ${esc(a.range||'')}`, `<button data-attack="${i}">Roll</button>${a.advantageButton?`<button data-attack="${i}" data-adv="3">Adv</button>`:''}${a.disButton?`<button data-attack="${i}" data-adv="4">Dis</button>`:''}`)).join('');
  $('traits').innerHTML = Object.entries(data.traits).filter(([k,t])=>!data.coreButtons?.includes(k)).map(([k,t])=>row(t.name, esc(t.source||''), `<button data-trait="${esc(k)}">Send</button>`)).join('');
  $('spells').innerHTML = (data.spells||[]).map((s,i)=>{
    const tags = `${esc(s.level||'')}; ${esc(s.time||'')}; ${esc(s.range||'')}; ${esc(s.duration||'')}${s.source?` <span class="spell-tag">${esc(s.source)}</span>`:''}`;
    const details = s.desc ? `<details class="spell-details"><summary>quick text</summary>${esc(s.desc).replace(/\n/g,'<br>')}</details>` : '';
    return row(s.name, tags, spellControls(s,i), details);
  }).join('') || '<p class="muted">No spells or rituals on this sheet.</p>';
  $('equipment').textContent = data.equipment || '';
  renderSummons(data);
  document.body.addEventListener('click', ev=>{
    const b=ev.target.closest('button'); if(!b) return;
    const slot = b.dataset.useSlot ? Number(document.querySelector(`select[data-slot-for="${b.dataset.useSlot}"]`)?.value || 0) : undefined;
    if(b.dataset.roll==='initiative') return rollCheck('initiative',{modifier:data.initiative}, characterFor(data.name));
    if(b.dataset.check) return rollCheck(b.dataset.check,{name:b.dataset.name, ability:b.dataset.ability, modifier:b.dataset.modifier}, characterFor(data.name));
    if(b.dataset.attack) return attackReq(data.attacks[Number(b.dataset.attack)], characterFor(data.name), '', {advantage: b.dataset.adv?Number(b.dataset.adv):undefined});
    if(b.dataset.trait){const t=data.traits[b.dataset.trait]; return traitReq(t.name,t.source,t.description, characterFor(data.name));}
    if(b.dataset.spellcard) return spellCardAtSlot(data.spells[Number(b.dataset.spellcard)], characterFor(data.name), slot);
    if(b.dataset.spellroll) return spellRoll(data.spells[Number(b.dataset.spellroll)], characterFor(data.name), slot);
    if(b.dataset.spellextra) return spellExtraRoll(data.spells[Number(b.dataset.spellextra)], b.dataset.extraKey, characterFor(data.name), slot);
    if(b.dataset.spellcheck) return spellCheck(data.spells[Number(b.dataset.spellcheck)], characterFor(data.name));
    if(b.dataset.summonCard) return sendSummonCard(data, Number(b.dataset.summonCard));
    if(b.dataset.summonAttack) return sendSummonAttack(data, Number(b.dataset.summonAttack), false);
    if(b.dataset.summonMulti) return sendSummonAttack(data, Number(b.dataset.summonMulti), true);
    if(b.dataset.summonSkill) { const s=data.summons[Number(b.dataset.summonSkill)]; const skill=s.skills[b.dataset.skillName]; return rollCheck('skill',{name:`${s.name} ${b.dataset.skillName}`,ability:skill.ability,modifier:skill.modifier}, characterFor(s.name,'Creature')); }
  }, {once:false});
  const lvl=$('undead-level'); if(lvl) lvl.addEventListener('change',()=>renderSummons(data));
  setTimeout(()=>{if(!bridgeReady) toast('Bridge not detected yet. Use the Party20 extension and open this page from http://localhost or https://anostus.github.io/.',false)},1000);
}
function renderSummons(data){
  const box=$('summons'); if(!box) return;
  const summons=data.summons||[];
  const undeadLevelSelector = $('undead-level');
  if(undeadLevelSelector) undeadLevelSelector.closest('.summon-controls').style.display = summons.some(s=>s.kind==='undead')?'block':'none';
  box.innerHTML = summons.map((s,idx)=>{
    const d = summonDynamic(s);
    const skills = s.skills ? Object.keys(s.skills).map(k=>`<button data-summon-skill="${idx}" data-skill-name="${esc(k)}">${esc(k)}</button>`).join('') : '';
    const attackBtns = s.attack ? `<button data-summon-attack="${idx}">${esc(s.attack.name)}</button>${s.kind==='undead'?`<button data-summon-multi="${idx}">Multiattack</button>`:''}` : '';
    return `<div class="summon"><h3>${esc(s.name)}</h3><div class="meta">${esc(d.meta)}</div><div class="tags">${(s.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><p class="muted">${esc(d.short||s.short||'')}</p><div class="actions"><button data-summon-card="${idx}">Stat/Traits</button>${skills}${attackBtns}</div></div>`
  }).join('') || '<p class="muted">No summons or familiars listed.</p>';
}
function summonDynamic(s){
  if(s.kind==='undead'){
    const lvl=Number($('undead-level')?.value || 3);
    const baseHp = s.baseHp ?? 30;
    return {ac:11+lvl, hp:baseHp+10*(lvl-3), multi:Math.floor(lvl/2), meta:`AC ${11+lvl}; HP ${baseHp+10*(lvl-3)}; speed ${s.speed}; multiattack ${Math.floor(lvl/2)}; spell level ${lvl}`, short:s.short};
  }
  return {meta:s.meta||'', short:s.short};
}
function sendSummonCard(data, idx){
  const s=data.summons[idx]; const d=summonDynamic(s);
  let desc = s.description || '';
  if(s.kind==='undead'){
    desc = `Medium undead. ${d.meta}. STR 12 (+1), DEX 16 (+3), CON 15 (+2), INT 4 (-3), WIS 10 (+0), CHA 9 (-1). Damage immunities: necrotic, poison. Condition immunities: exhaustion, frightened, paralyzed, poisoned. Senses darkvision 60 ft, passive Perception 10. Languages: understands the languages ${data.name} speaks. Proficiency bonus equals summoner's. ${s.description||''}`;
  }
  traitReq(s.name, s.source||'Summon/Familiar', desc, characterFor(s.name,'Creature'));
}
function sendSummonAttack(data, idx, multi){
  const s=data.summons[idx]; if(!s.attack) return;
  const d=summonDynamic(s); let a={...s.attack};
  if(s.kind==='undead'){
    const lvl=Number($('undead-level')?.value || 3);
    a.damage = `${s.attack.base} + ${3+lvl}`;
    a.crit = s.attack.base;
  }
  const count=multi?(d.multi||1):1;
  for(let i=0;i<count;i++) setTimeout(()=>attackReq(a, characterFor(s.name,'Creature'), count>1?`${i+1}/${count} `:''), i*180);
}

const BRINDLE = {
  name:'Brindle Duskhorn', title:'Brindle Duskhorn — Level 6 Bladesinger', subtitle:'Level 6 Satyr Wizard — Bladesinger · Hermit · Medium Fey · Updated spell rollers', initiative:'+2',
  core:[{label:'AC',value:'15 Mage Armor · 18 Bladesong'},{label:'HP',value:'38'},{label:'Hit Dice',value:'6d6'},{label:'Speed',value:'35 ft · 45 Bladesong'},{label:'Prof',value:'+3'},{label:'Spell DC',value:'14'},{label:'Spell Atk',value:'+6'},{label:'Slots',value:'1st 4 · 2nd 3 · 3rd 3'}],
